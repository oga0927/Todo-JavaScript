<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todoリスト</title>
  <link rel="stylesheet" href="css/normarize.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="wrapper">
    <h1>Todo</h1>
    <!-- タブ Begin -->
    <div id="tab">
      <div class="tab-list">
        <button data-target="inbox">インボックス</button>
      </div>
      <div class="tab-list">
        <button data-target="inbox">完了したタスク</button>
      </div>
      <div class="tab-list">
        <section id="sort-menu">
          <option value="create-desc">登録日↓</option>
          <option value="create-asc">登録日↑</option>
          <option value="create-desc">優先度↓</option>
          <option value="create-asc">優先度↑</option>
        </section>
      </div>
    </div>
    <!-- タブ End -->

    <!-- Todoリスト Begin -->
    <table id="todo-table">
      <thead>
        <tr>
          <th></th>
          <th>Todo</th>
          <th>登録日</th>
          <th>優先度</th>
          <th></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="todo-main">
        <th></th>
      </tbody>
    </table>
    <!-- Todo リストEND -->

    <!-- Todo 入力フォーム　Begin -->
    <form id="input-form">
      <div class="input-text">
        <label for="input-text">Todo</label>
      </div>
    </form>
  </div>
</body>
</html>
